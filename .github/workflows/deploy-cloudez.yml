name: Deploy Astro SSR na Cloudez

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    name: Rodar deploy no servidor
    runs-on: ubuntu-latest

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CLOUDEZ_SSH_KEY }}" > ~/.ssh/cloudez_key
          chmod 600 ~/.ssh/cloudez_key
          ssh-keyscan -H "${{ secrets.CLOUDEZ_HOST }}" >> ~/.ssh/known_hosts

      - name: Executar deploy remoto
        run: |
          ssh -i ~/.ssh/cloudez_key \
            "${{ secrets.CLOUDEZ_USER }}@${{ secrets.CLOUDEZ_HOST }}" \
            "bash ~/deploy-astro-ssr.sh"
